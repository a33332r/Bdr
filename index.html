<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=bdr.html">
    <title>أرشيف بدر الخالص - نظام إدارة المنظمين</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d3d16 0%, #1a5f2a 50%, #2d8a3e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .container {
            padding: 2rem;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #c9a227;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        p { opacity: 0.9; margin-bottom: 1rem; }
        a {
            color: #e8d47a;
            text-decoration: none;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border: 2px solid #c9a227;
            border-radius: 8px;
            display: inline-block;
            transition: all 0.3s ease;
        }
        a:hover {
            background: #c9a227;
            color: #0d3d16;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>أرشيف بدر الخالص</h1>
        <p>جاري التوجيه إلى النظام...</p>
        <a href="bdr.html">اضغط هنا إذا لم يتم التوجيه تلقائياً</a>
    </div>
</body>
</html>
